<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        .banner-acessivel {
            background-color: #ee4d2d; 
            color: #ffffff; 
            padding: 30px;
            text-align: center;
        }
        .btn-teclado {
            font-size: 1.1rem; 
            padding: 10px 20px;
            cursor: pointer;
            outline: 3px solid transparent;
        }
        .btn-teclado:focus { 
            outline: 3px solid #000;
        }
    </style>
</head>
<body>
    <div class="banner-acessivel">
        <h1>Saldão de Verão</h1>
        <p>Descontos reais com leitura facilitada.</p>
        <button class="btn-teclado">Resgatar Cupom</button>
    </div>
</body>
</html>
